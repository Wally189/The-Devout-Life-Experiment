<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lesson — The Devout and Practical Life Experiment</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="course.css">
</head>
<body>
  <main id="lesson"></main>
  <script src="app.js"></script>
  <script src="site.js"></script>
  <script>
    DEVOUT.lessonPage = function () {
      const n = Number(new URLSearchParams(location.search).get('n')) || 1;
      const l = COURSE.find((item) => item.n === n) || COURSE[0];
      document.title = `Week ${l.n}: ${l.title} — The Devout and Practical Life Experiment`;

      document.querySelector('#lesson').innerHTML = `
        <article class="course-page lesson-page">
          <section class="prayer-strip course-prayer">
            <h2>Opening prayer</h2>
            <p>${LESSON_PRAYER}</p>
            <p class="small">Remain silent for a moment and prepare yourself gently for the session.</p>
          </section>

          <div class="lesson-number">Week ${l.n} of ${COURSE.length} · ${l.phase}</div>
          <h2>${l.title}</h2>
          <section class="course-purpose"><strong>Why this week comes here:</strong> ${l.why}</section>

          <div class="course-accordions lesson-accordions">
            <details class="course-phase">
              <summary>
                <span><strong>Readings for this week</strong><small>The principal text and its carefully chosen companion</small></span>
                <span class="phase-progress">1</span>
              </summary>
              <div class="phase-weeks reading-grid">
                ${readingCard('Primary reading', l.primary, l.detail, l.primaryUrl)}
                ${readingCard('Companion or Church reading', l.companion, l.companionDetail, l.companionUrl)}
              </div>
            </details>

            <details class="course-phase" open>
              <summary>
                <span><strong>The weekly method</strong><small>Sunday to Saturday · use this method for every lesson</small></span>
                <span class="phase-progress">2</span>
              </summary>
              <div class="phase-weeks session-plan">
                <ol>
                  <li><strong>Sunday — first reading:</strong> read the assigned passage from St Francis de Sales straight through. Do not analyse it heavily. Simply notice what strikes you.</li>
                  <li><strong>Monday — second reading and rough notes:</strong> read the same passage again slowly. Note the main argument, important images, difficult points and anything personally challenging.</li>
                  <li><strong>Tuesday — first reading of the companion text:</strong> read the assigned Scripture, Catechism, saint, papal or other approved Catholic text.</li>
                  <li><strong>Wednesday — second reading and notes:</strong> read the companion text again and note how it confirms, clarifies or qualifies St Francis’s teaching.</li>
                  <li><strong>Thursday — questions and optional rereading:</strong> answer the lesson questions below. Reread relevant passages where necessary.</li>
                  <li><strong>Friday — examination of conscience:</strong> examine the week’s theme, distinguishing actual sin from temptation, weakness, disorderly habit, neglected duty and ordinary room for growth.</li>
                  <li><strong>Saturday — confession and amendment:</strong> go to Confession where appropriate, needed and reasonably available. Then choose one principal amendment and, if useful, one supporting practice. Repeat an existing amendment rather than inventing a new one when it still needs work.</li>
                </ol>
                <p><strong>Minimum faithful week:</strong> read the primary text, answer one question and choose one proportionate amendment. Reduce the exercise before abandoning it.</p>
              </div>
            </details>

            <details class="course-phase">
              <summary>
                <span><strong>Rough notes are enough</strong><small>There is no single right way to do this</small></span>
                <span class="phase-progress">3</span>
              </summary>
              <div class="phase-weeks">
                <p>You do not need a beautiful journal, elaborate planner or polished study notes. A battered old notepad is perfectly sufficient.</p>
                <p>Your notes may be short bullet points, underlined phrases, rough sketches, diagrams, personal reflections or one sentence about how to apply the lesson today. The purpose is not to produce impressive notes. It is to understand the lesson, pray with it and begin applying it in ordinary life.</p>
                <figure class="rough-notes-example">
                  <img src="images/rough-notes-example.jpg" alt="Example of rough handwritten notes on the first chapters of Introduction to the Devout Life">
                  <figcaption>Example only: simple handwritten notes, small sketches and one practical resolution. There is no right way to take notes for this course.</figcaption>
                </figure>
              </div>
            </details>

            <details class="course-phase">
              <summary>
                <span><strong>Questions for this week</strong><small>Use only what helps you reach a truthful, proportionate answer</small></span>
                <span class="phase-progress">4</span>
              </summary>
              <div class="phase-weeks">
                <ul>${l.questions.map((question) => `<li>${question}</li>`).join('')}</ul>
                ${hints()}
              </div>
            </details>

            <details class="course-phase">
              <summary>
                <span><strong>One principal amendment</strong><small>A single concrete practice arising from the reading</small></span>
                <span class="phase-progress">5</span>
              </summary>
              <div class="phase-weeks">
                <p>${l.amend}</p>
                <p><strong>One principal amendment is normally enough.</strong> Add one supporting practice only where it genuinely helps. Continue last week’s amendment when necessary rather than accumulating resolutions.</p>
              </div>
            </details>

            <details class="course-phase">
              <summary>
                <span><strong>End-of-week review</strong><small>A brief handwritten review is enough</small></span>
                <span class="phase-progress">6</span>
              </summary>
              <div class="phase-weeks">
                <p>Ask: What have I understood? What have I seen in myself? What needs to change? What one amendment should I now practise?</p>
                ${journal()}
              </div>
            </details>
          </div>

          <p class="lesson-nav">
            ${l.n > 1 ? `<a class="button secondary" href="lesson.html?n=${l.n - 1}">← Previous</a>` : `<a class="button secondary" href="lessons.html">← Course</a>`}
            ${l.n < COURSE.length ? `<a class="button" href="lesson.html?n=${l.n + 1}">Next week →</a>` : `<a class="button" href="rule.html">Review the Rule of Life →</a>`}
          </p>
        </article>`;
    };

    DEVOUT.shell('lessons.html');
    DEVOUT.lessonPage();
  </script>
</body>
</html>
