<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Journal — The Devout Life Experiment</title><link rel="stylesheet" href="styles.css"></head><body><main><h2>Guided journal</h2><p>Use this at the end of every lesson. It is intentionally repetitive so that the discipline becomes familiar and the subject—not the form—receives attention.</p><section class="journal-block"><label>Lesson and date</label><input><label>The central teaching in my own words</label><textarea></textarea><label>What I recognised in myself</label><textarea></textarea><label>Facts and examples from the week</label><textarea></textarea><label>Is this sin, habit, occasion, wound, practical disorder, relationship difficulty, health matter or question of duty?</label><textarea></textarea><label>The virtue and remedy proposed by the reading</label><textarea></textarea><label>My one concrete amendment</label><textarea></textarea><label>What happened in practice</label><textarea></textarea><label>What failure revealed</label><textarea></textarea><label>Grace, progress and help received</label><textarea></textarea><label>What I will continue, change or stop</label><textarea></textarea><label>Matter for prayer, confession, pastoral counsel or healthcare</label><textarea></textarea><button class="button no-print" onclick="window.print()">Print or save</button></section></main><script src="app.js"></script><script>DEVOUT.shell('journal.html')</script></body></html>
